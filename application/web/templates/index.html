<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Ghana Roads — GEOINT Prototype</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <link rel="stylesheet" href="/static/styles.css"/>
</head>
<body>
  <header class="topbar">
    <div class="title">Ghana Road Infrastructure Quality Explorer</div>
    <div class="subtitle">GEE + OSM • GEOINT‑style interface</div>
  </header>

  <section class="container">
    <div class="panel">
      <div class="panel-title">Controls</div>

      <div class="panel-title">Road Classes (Map 1)</div>
      <div id="map1-classes"></div>

      <label>Region (Map 2)</label>
      <select id="region"></select>

      <label>Road class (Map 2)</label>
      <select id="road_class"></select>

      <label>Year</label>
      <input type="number" id="year" value="2023" min="2017" max="2025"/>

      <label>Quarter</label>
      <select id="quarter">
        <option>Jan–Mar</option>
        <option>Apr–Jun</option>
        <option>Jul–Sep</option>
        <option>Oct–Dec</option>
      </select>

      <label>Max cloud (%)</label>
      <input type="number" id="cloud" value="30" min="0" max="90"/>

      <label>Scale (m)</label>
      <select id="scale">
        <option>10</option>
        <option selected>20</option>
        <option>30</option>
        <option>60</option>
      </select>
    </div>

    <div class="maps">
      <div class="map-card">
        <div class="map-title">Map 1 — Ghana roads (Top 10, toggle layers)</div>
        <div id="map1"></div>
      </div>

      <div class="map-card">
        <div class="map-title">Map 2 — Region + class, click for stats</div>
        <div id="map2"></div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-title">Selected road</div>
      <pre id="results">{}</pre>

      <div class="panel-title" style="margin-top:12px;">Metrics explanation</div>
      <div id="metrics"></div>
    </div>
  </section>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
