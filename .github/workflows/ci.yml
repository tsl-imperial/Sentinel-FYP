name: CI

on:
  push:
    branches: [main, v2-pan]
  pull_request:

jobs:
  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    env:
      NETINSPECT_SKIP_EE_INIT: "1"
      NETINSPECT_DEV: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run pytest
        run: pytest -v

  frontend:
    name: Frontend (lint + typecheck + vitest + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.11'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install Node deps
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Unit tests
        run: npm run test
      - name: Build
        run: npm run build
        env:
          # The build evaluates next.config.js which loads ../../../.env via dotenv.
          # In CI we don't have a .env file, so the rewrites destination falls back
          # to the default (127.0.0.1:5000). That's fine — build doesn't actually call it.
          FLASK_BACKEND_URL: http://127.0.0.1:5000
